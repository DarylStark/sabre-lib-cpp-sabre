---
on:
  push:

jobs:
  unit-testing:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install build tools
        run: sudo apt install cmake ninja-build
      - name: Build project
        run: |
          cmake --preset rel-sabre-tests -DSABRE_BUILD_PILOT=OFF
          cmake --build build/rel-sabre-tests
      - name: Run tests
        run: |
          cd build/rel-sabre-tests
          ctest
