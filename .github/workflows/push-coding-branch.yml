---
on:
  push:

jobs:
  code-format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install clang-format
        run: sudo apt install clang-format
      - name: Check code formatting
        run: |
          # Find all C++ source files in src and tests directories
          files=$(find src tests -type f \( -name "*.cpp" -o -name "*.h" \
            -o -name "*.hpp" -o -name "*.c" -o -name "*.cc" \))

          # Check formatting for each file
          for file in $files; do
            if ! clang-format --dry-run -Werror "$file" 2>&1; then
              echo "Error: $file is not formatted correctly"
              echo "Please run: clang-format -i $file"
              exit 1
            fi
          done

          echo "All files are formatted correctly!"

  unit-testing:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install build tools
        run: sudo apt install cmake ninja-build
      - name: Build project
        run: |
          cmake --preset dbg-sabre-pilot-tests -DSABRE_BUILD_PILOT=OFF
          cmake --build build/dbg-sabre-pilot-tests
      - name: Run tests
        run: |
          cd build/dbg-sabre-pilot-tests
          ctest
