---
on:
  push:

jobs:

  clang-format:
    name: Clang Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get install clang-format
      - name: Check formatting
        run: |
          find src tests \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) \
            | xargs clang-format --dry-run --Werror

  unit-testing:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: sudo apt install cmake ninja-build
      - name: Build project
        run: |
          cmake --preset dbg-sabre-pilot-tests -DSABRE_BUILD_PILOT=OFF
          cmake --build build/dbg-sabre-pilot-tests
      - name: Run tests
        run: |
          cd build/dbg-sabre-pilot-tests
          ctest
